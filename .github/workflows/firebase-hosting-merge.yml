name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
      - maintenance

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Firebase URL
        run: |
          sed -i 's|FIREBASE_DB_URL_PLACEHOLDER|${{ secrets.FIREBASE_DB_URL }}|g' index.html

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_TSHIRT_ORDERS_44725 }}"
          channelId: live
          projectId: tshirt-orders-44725