name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - maintenance   # optional (for maintenance mode)

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🚫 REMOVE npm install/build (not needed)

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_TSHIRT_ORDERS_44725 }}"
          channelId: live
          projectId: tshirt-orders-44725